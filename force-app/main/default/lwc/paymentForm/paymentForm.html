<template>
    <div class="slds-card">
        <div class="slds-card__body slds-card__body_inner">

            <!-- DEBUG: config error panel — remove before go-live -->
            <template lwc:if={configError}>
                <div class="error-debug-panel" role="alert">
                    <p class="error-debug-title">{labels.ec_debug_config_error_title}</p>
                    <p class="error-debug-body">{configError}</p>
                </div>
            </template>

            <fieldset class="form-section slds-form slds-form_stacked">
                <legend class="visually-hidden">{labels.ec_sr_amount_group}</legend>
                <div class="slds-form-element">
                    <label class="slds-form-element__label" for={amountInputId}>
                        <abbr class="slds-required" title="required">*</abbr>{labels.ec_label_amount}
                    </label>
                    <div class="slds-form-element__control slds-input-has-fixed-addon">
                        <template lwc:if={symbolBefore}>
                            <span class="slds-form-element__addon">{currencySymbol}</span>
                        </template>
                        <input type="text"
                               inputmode="decimal"
                               autocomplete="transaction-amount"
                               id={amountInputId}
                               class="slds-input"
                               value={amountValue}
                               required
                               oninput={handleAmountInput}
                               onblur={handleAmountBlur}
                               onfocus={handleAmountFocus} />
                        <template lwc:if={symbolAfter}>
                            <span class="slds-form-element__addon">{currencySymbol}</span>
                        </template>
                    </div>
                </div>
                <template lwc:if={shouldShowFrequency}>
                    <fieldset class="frequency-toggle">
                        <legend class="visually-hidden">{labels.ec_label_frequency}</legend>
                        <input type="radio"
                               id={oneTimeFrequencyId}
                               name={frequencyGroupName}
                               value="oneTime"
                               class="visually-hidden"
                               checked={isOneTimeFrequencySelected}
                               onchange={handleFrequencyChange} />
                        <label for={oneTimeFrequencyId} class="toggle-option">{labels.ec_label_frequency_one_time}</label>

                        <input type="radio"
                               id={recurringFrequencyId}
                               name={frequencyGroupName}
                               value="recurring"
                               class="visually-hidden"
                               checked={isRecurringFrequencySelected}
                               onchange={handleFrequencyChange} />
                        <label for={recurringFrequencyId} class="toggle-option">
                            <lightning-icon icon-name="utility:heart"
                                            size="x-small"
                                            class="monthly-icon"
                                            aria-hidden="true">
                            </lightning-icon>
                            {labels.ec_label_frequency_recurring}
                        </label>
                    </fieldset>
                </template>
            </fieldset>

            <fieldset class="form-section slds-form slds-form_stacked">
                <legend class="visually-hidden">{labels.ec_sr_personal_info_group}</legend>
                <lightning-input type="text"
                                 label={labels.ec_label_first_name}
                                 placeholder={labels.ec_placeholder_first_name}
                                 value={firstName}
                                 data-field="firstName"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="text"
                                 label={labels.ec_label_last_name}
                                 placeholder={labels.ec_placeholder_last_name}
                                 value={lastName}
                                 data-field="lastName"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="email"
                                 label={labels.ec_label_email_address}
                                 placeholder={labels.ec_placeholder_email}
                                 value={email}
                                 data-field="email"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
            </fieldset>

            <c-payment-selector
                config={paymentMethodConfig}
                frequency={frequency}
                payment-intent-response={paymentError}
                onpaymentmethodchanged={handlePaymentMethodChanged}>
            </c-payment-selector>
            <cpm-pay-button payment-intent={paymentIntent} disabled={isPayButtonDisabled} onresult={handlePaymentResult}></cpm-pay-button>

        </div>
    </div>

    <!-- DEBUG: temporary error panel for testing — remove before go-live -->
    <template lwc:if={paymentError}>
        <div class="error-debug-panel" role="alert">
            <p class="error-debug-title">{labels.ec_debug_error_title}</p>
            <pre class="error-debug-body">{paymentErrorJson}</pre>
        </div>
    </template>
</template>
