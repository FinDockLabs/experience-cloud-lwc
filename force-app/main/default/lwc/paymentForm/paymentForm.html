<template>
    <div class="slds-card">
        <div class="slds-card__body slds-card__body_inner">

            <!-- DEBUG: config error panel — remove before go-live -->
            <template lwc:if={configError}>
                <div class="error-debug-panel" role="alert">
                    <p class="error-debug-title">{labels.ec_debug_config_error_title}</p>
                    <p class="error-debug-body">{configError}</p>
                </div>
            </template>

            <div class="slds-form slds-form_stacked slds-m-bottom_medium">
                <c-amount-and-frequency
                    default-currency={currency}
                    show-frequency-toggle={showFrequency}
                    default-frequency={defaultFrequency}
                    onamountfrequencychange={handleAmountFrequencyChanged}>
                </c-amount-and-frequency>
            </div>

            <fieldset class="form-section slds-form slds-form_stacked slds-m-bottom_medium">
                <legend class="visually-hidden">{labels.ec_sr_personal_info_group}</legend>
                <lightning-input type="text"
                                 label={labels.ec_label_first_name}
                                 placeholder={labels.ec_placeholder_first_name}
                                 value={firstName}
                                 data-field="firstName"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="text"
                                 label={labels.ec_label_last_name}
                                 placeholder={labels.ec_placeholder_last_name}
                                 value={lastName}
                                 data-field="lastName"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="email"
                                 label={labels.ec_label_email_address}
                                 placeholder={labels.ec_placeholder_email}
                                 value={email}
                                 data-field="email"
                                 required
                                 onchange={handleFieldChange}>
                </lightning-input>
            </fieldset>

            <c-payment-selector
                config={paymentMethodConfig}
                frequency={frequency}
                payment-intent-response={paymentError}
                onpaymentmethodchanged={handlePaymentMethodChanged}>
            </c-payment-selector>
            <cpm-pay-button payment-intent={paymentIntent} disabled={isPayButtonDisabled} onresult={handlePaymentResult}></cpm-pay-button>

        </div>
    </div>

    <!-- DEBUG: temporary error panel for testing — remove before go-live -->
    <template lwc:if={paymentError}>
        <div class="error-debug-panel" role="alert">
            <p class="error-debug-title">{labels.ec_debug_error_title}</p>
            <pre class="error-debug-body">{paymentErrorJson}</pre>
        </div>
    </template>
</template>
